<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARÁGRAFOS</title>
</head>
<body>
    <h1>Parágrafos e quebras de linhas</h1>
    <hr>
    <p>Você pode escrever um parágrafo de qualquer jeito, basta colocar tudo no meio de um par de tags &lt;p&gt;; e &lt;/p&gt;; </p>
    <p>Se precisar quebrar o texto em algum lugar especifico, <br> pode usar a tag &lt;br&gt; </p>
    <p>Vamos adicionat alguns símbolos
        &reg;
        &copy;
        &euro;
        &pound;    
    </p>
    <p>Vamos adicionar alguns emojis:
        &#x1F3B6;
    </p>
   
</body>
</html>
