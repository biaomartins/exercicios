<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML temos várias tags que nos permitem estruturar o conteúdo de uma página web.</p>
    <ul>
        <li><abbr title="Use a tag <H1 a H2>">Titulos</abbr></li>
        <li><abbr title="Use a tag <strong>">Negrito</abbr></li>
        <li><abbr title="Use a tag <img>">Imagens</abbr></li>
        <li><abbr title="Use a tag <p>">Paragrafos</abbr></li>
        <li><abbr title="Use a tag <br>">Quebra de linha</abbr></li>
        <li><abbr title="Use a tag <hr>">Linha horizontal</abbr></li>
        <li><abbr title="Use a tag <a>">Links</abbr></li>
        <li><abbr title="Use a tag <blockquote>">Citações</abbr></li>
    </ul>
</body>
</html>
